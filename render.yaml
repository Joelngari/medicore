services:
  - type: web
    name: educore
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: educore-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: educore-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: educore-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: educore-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: educore-db
          property: port

databases:
  - name: educore-db
    plan: free